<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Radiologist Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="overlay"></div>

<div class="container">
  <h2>🩻 Radiologist Portal</h2>
  <p id="doctorName" class="welcome"></p>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('availability', this)">Time Slots</div>
    <div class="tab" onclick="switchTab('leave', this)">Leave</div>
    <div class="tab" onclick="switchTab('cases', this)">My Cases</div>
  </div>

  <!-- Availability -->
  <div id="availability" class="tab-content active">
    <div class="form-group">
      <label>Start Time</label>
      <input id="startTime" type="datetime-local" />
    </div>

    <div class="form-group">
      <label>End Time</label>
      <input id="endTime" type="datetime-local" />
    </div>

    <button class="primary-btn" onclick="declareAvailability()">Submit</button>
    <p id="availabilityMsg"></p>
  </div>

  <!-- Leave -->
  <div id="leave" class="tab-content">
    <div class="form-group">
      <label>Start Date</label>
      <input id="leaveStart" type="date" />
    </div>

    <div class="form-group">
      <label>End Date</label>
      <input id="leaveEnd" type="date" />
    </div>

    <div class="form-group">
      <label>Reason</label>
      <input id="reason" type="text" placeholder="Reason" />
    </div>

    <button class="primary-btn" onclick="applyLeave()">Apply Leave</button>
    <p id="leaveMsg"></p>
  </div>

  <!-- My Cases -->
  <div id="cases" class="tab-content">
  <div class="cases-header">
    <h3>Assigned Cases</h3>
    <button class="refresh-btn" onclick="fetchAssignments()">🔄 Refresh</button>
  </div>

  <table class="modern-table">
    <thead>
      <tr>
        <th>Ticket</th>
        <th>Category</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Viewer</th>
        <th>Action</th>
        <th>Assigned At</th>
      </tr>
    </thead>
    <tbody id="assignmentTable"></tbody>
  </table>
</div>

  <div class="logout">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
